<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CardioAI — Page Not Found</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root{--bg:#060810;--card:#111827;--border:rgba(255,255,255,0.06);--red:#e8394a;--sub:#94a3b8;--muted:#64748b;--text:#f1f5f9;--font-d:'Space Grotesk',sans-serif;--font-b:'Inter',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
  .container{max-width:480px}
  .code{font-family:var(--font-d);font-size:7rem;font-weight:700;color:var(--red);line-height:1;opacity:.15;margin-bottom:-1.5rem}
  .icon{font-size:3.5rem;margin-bottom:1.5rem}
  h1{font-family:var(--font-d);font-size:1.8rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.75rem}
  p{color:var(--sub);font-size:.95rem;line-height:1.7;margin-bottom:2rem}
  .links{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
  .btn{padding:.7rem 1.5rem;border-radius:8px;font-size:.875rem;font-weight:600;text-decoration:none;transition:all .2s;font-family:var(--font-b)}
  .btn.red{background:var(--red);color:#fff}
  .btn.red:hover{background:#c0313f}
  .btn.ghost{background:var(--card);color:var(--sub);border:1px solid var(--border)}
  .btn.ghost:hover{border-color:rgba(232,57,74,.3);color:var(--text)}
</style>
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <div class="icon">🫀</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get your heart health back on track.</p>
  <div class="links">
    <a href="/"        class="btn red">← Go Home</a>
    <a href="/predict" class="btn ghost">New Assessment</a>
  </div>
</div>
</body>
</html>
