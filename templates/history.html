<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CardioAI — Prediction History</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#060810; --surface:#0d1117; --card:#111827; --border:rgba(255,255,255,0.06);
    --red:#e8394a; --green:#22c55e; --amber:#f59e0b;
    --text:#f1f5f9; --muted:#64748b; --sub:#94a3b8;
    --font-d:'Space Grotesk',sans-serif; --font-b:'Inter',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-b);min-height:100vh}

  nav{display:flex;align-items:center;justify-content:space-between;padding:0 2.5rem;height:64px;
    background:rgba(6,8,16,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:50}
  .nav-logo{display:flex;align-items:center;gap:.6rem;font-family:var(--font-d);font-weight:700;
    font-size:1.1rem;letter-spacing:-.02em;text-decoration:none;color:var(--text)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 10px var(--red);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
  .nav-links{display:flex;gap:1rem}
  .nav-btn{background:var(--red);color:#fff;border:none;cursor:pointer;padding:.45rem 1rem;
    border-radius:6px;font-size:.8rem;font-weight:600;font-family:var(--font-b);text-decoration:none;transition:all .2s}
  .nav-btn:hover{background:#c0313f}
  .nav-ghost{background:transparent;color:var(--sub);border:1px solid var(--border);cursor:pointer;
    padding:.45rem 1rem;border-radius:6px;font-size:.8rem;font-weight:500;font-family:var(--font-b);
    text-decoration:none;transition:all .2s}
  .nav-ghost:hover{border-color:rgba(255,255,255,.2);color:var(--text)}

  .page{max-width:1100px;margin:0 auto;padding:3rem 1.5rem}

  .page-header{margin-bottom:2.5rem}
  .page-label{font-size:.75rem;color:var(--red);text-transform:uppercase;letter-spacing:.12em;font-weight:600;margin-bottom:.5rem}
  .page-title{font-family:var(--font-d);font-size:2rem;font-weight:700;letter-spacing:-.03em;margin-bottom:.4rem}
  .page-sub{color:var(--sub);font-size:.9rem}

  /* Stats row */
  .stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:2.5rem}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1.25rem;text-align:center}
  .stat-card .num{font-family:var(--font-d);font-size:1.8rem;font-weight:700;letter-spacing:-.03em}
  .stat-card .lbl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem}

  /* Filters */
  .filters{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
  .filter-btn{background:var(--card);border:1px solid var(--border);color:var(--sub);
    padding:.4rem .9rem;border-radius:6px;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s}
  .filter-btn.active,.filter-btn:hover{border-color:rgba(232,57,74,.4);color:var(--text);background:rgba(232,57,74,.05)}
  .search-box{margin-left:auto;background:var(--card);border:1px solid var(--border);border-radius:6px;
    color:var(--text);font-family:var(--font-b);font-size:.85rem;padding:.4rem .9rem;outline:none;
    transition:border-color .2s;min-width:200px}
  .search-box:focus{border-color:rgba(232,57,74,.4)}
  .search-box::placeholder{color:var(--muted)}

  /* Table */
  .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead tr{background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)}
  th{padding:.85rem 1.1rem;font-size:.72rem;font-weight:600;color:var(--muted);
    text-transform:uppercase;letter-spacing:.08em;text-align:left}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,.025)}
  td{padding:.9rem 1.1rem;font-size:.875rem;color:var(--sub)}
  td.id-col{color:var(--muted);font-size:.8rem}
  td.name-col{color:var(--text);font-weight:500}

  .risk-pill{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .75rem;
    border-radius:999px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
  .risk-Low   {background:rgba(34,197,94,.1);  border:1px solid rgba(34,197,94,.3);  color:#22c55e}
  .risk-Moderate{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:#f59e0b}
  .risk-High  {background:rgba(239,68,68,.1);  border:1px solid rgba(239,68,68,.3);  color:#ef4444}

  .prob-bar-wrap{display:flex;align-items:center;gap:.6rem}
  .prob-bar{flex:1;height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;max-width:80px}
  .prob-fill{height:100%;border-radius:2px}

  .action-btns{display:flex;gap:.5rem}
  .act-btn{background:transparent;border:1px solid var(--border);color:var(--sub);
    padding:.3rem .65rem;border-radius:5px;font-size:.75rem;cursor:pointer;text-decoration:none;
    transition:all .15s;white-space:nowrap}
  .act-btn:hover{border-color:rgba(232,57,74,.4);color:var(--text)}

  .empty-state{padding:4rem 2rem;text-align:center;color:var(--muted)}
  .empty-state p{font-size:.9rem;margin-top:.5rem}

  /* Detail drawer */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
    z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
  .drawer-overlay.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;right:0;top:0;bottom:0;width:min(420px,100vw);
    background:var(--surface);border-left:1px solid var(--border);z-index:101;
    transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);
    overflow-y:auto;padding:2rem}
  .drawer.open{transform:translateX(0)}
  .drawer-close{background:none;border:1px solid var(--border);color:var(--sub);
    width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:1.1rem;
    display:flex;align-items:center;justify-content:center;float:right;margin-bottom:1.5rem;transition:all .2s}
  .drawer-close:hover{border-color:rgba(232,57,74,.4);color:var(--text)}
  .drawer h3{font-family:var(--font-d);font-size:1.1rem;font-weight:700;margin-bottom:1.25rem;clear:both}
  .detail-row{display:flex;justify-content:space-between;padding:.55rem 0;
    border-bottom:1px solid var(--border);font-size:.85rem}
  .detail-row:last-child{border-bottom:none}
  .detail-key{color:var(--muted)}
  .detail-val{color:var(--text);font-weight:500;text-align:right;max-width:60%}
  .factors-list{margin-top:1rem}
  .factor-item{display:flex;align-items:flex-start;gap:.5rem;padding:.4rem 0;
    font-size:.82rem;color:var(--sub);border-bottom:1px solid var(--border)}
  .factor-item:last-child{border-bottom:none}
  .factor-item::before{content:'›';color:var(--red);font-weight:700;flex-shrink:0}
  .drawer-actions{display:flex;flex-direction:column;gap:.75rem;margin-top:1.5rem}
  .drawer-btn{display:block;text-align:center;padding:.7rem;border-radius:8px;font-size:.875rem;
    font-weight:600;text-decoration:none;transition:all .2s;cursor:pointer;border:none;font-family:var(--font-b)}
  .drawer-btn.primary{background:var(--red);color:#fff}
  .drawer-btn.primary:hover{background:#c0313f}
  .drawer-btn.secondary{background:var(--card);color:var(--sub);border:1px solid var(--border)}
  .drawer-btn.secondary:hover{border-color:rgba(232,57,74,.3);color:var(--text)}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo"><div class="dot"></div>CardioAI</a>
  <div class="nav-links">
    <a href="/predict" class="nav-btn">+ New Assessment</a>
    <a href="/chat"    class="nav-ghost">AI Chat</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-label">Records</div>
    <h1 class="page-title">Prediction History</h1>
    <p class="page-sub">All assessments saved to the local database, most recent first.</p>
  </div>

  <!-- Stats -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="num" id="statTotal">—</div><div class="lbl">Total</div></div>
    <div class="stat-card"><div class="num" style="color:var(--green)"  id="statLow">—</div><div class="lbl">Low Risk</div></div>
    <div class="stat-card"><div class="num" style="color:var(--amber)"  id="statMod">—</div><div class="lbl">Moderate</div></div>
    <div class="stat-card"><div class="num" style="color:var(--red)"    id="statHigh">—</div><div class="lbl">High Risk</div></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="filterRisk('All',this)">All</button>
    <button class="filter-btn" onclick="filterRisk('Low',this)">Low</button>
    <button class="filter-btn" onclick="filterRisk('Moderate',this)">Moderate</button>
    <button class="filter-btn" onclick="filterRisk('High',this)">High</button>
    <input class="search-box" id="searchBox" placeholder="Search by age, sex, risk…" oninput="renderTable()"/>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Date</th><th>Age</th><th>Sex</th>
          <th>Probability</th><th>Risk Level</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="empty-state">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <h3 id="drawerTitle">Assessment Details</h3>
  <div id="drawerContent"></div>
  <div class="drawer-actions" id="drawerActions"></div>
</div>

<script>
let allRecords = [];
let activeFilter = 'All';

async function loadData() {
  const res  = await fetch('/history/data');
  allRecords = await res.json();

  // Stats
  document.getElementById('statTotal').textContent = allRecords.length;
  document.getElementById('statLow').textContent   = allRecords.filter(r=>r.risk_level==='Low').length;
  document.getElementById('statMod').textContent   = allRecords.filter(r=>r.risk_level==='Moderate').length;
  document.getElementById('statHigh').textContent  = allRecords.filter(r=>r.risk_level==='High').length;

  renderTable();
}

function filterRisk(level, btn) {
  activeFilter = level;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderTable() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let rows = allRecords.filter(r => {
    if (activeFilter !== 'All' && r.risk_level !== activeFilter) return false;
    if (q) {
      const hay = `${r.age} ${r.sex} ${r.risk_level} ${r.probability}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const tbody = document.getElementById('tableBody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">No records found<p>Try a different filter or run a new assessment.</p></div></td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const probColor = r.risk_level==='Low'?'#22c55e':r.risk_level==='Moderate'?'#f59e0b':'#ef4444';
    return `
    <tr onclick="openDrawer(${r.id})">
      <td class="id-col">#${r.id}</td>
      <td>${r.timestamp}</td>
      <td class="name-col">${r.age} yrs</td>
      <td>${r.sex}</td>
      <td>
        <div class="prob-bar-wrap">
          <span style="color:${probColor};font-weight:600;font-size:.875rem">${r.probability}%</span>
          <div class="prob-bar"><div class="prob-fill" style="width:${r.probability}%;background:${probColor}"></div></div>
        </div>
      </td>
      <td><span class="risk-pill risk-${r.risk_level}">${r.risk_level}</span></td>
      <td>
        <div class="action-btns" onclick="event.stopPropagation()">
          <a href="/chat?pred_id=${r.id}" class="act-btn">💬 Chat</a>
          <a href="/report/${r.id}"       class="act-btn">📄 PDF</a>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function openDrawer(id) {
  const r = allRecords.find(x=>x.id===id);
  if (!r) return;
  const probColor = r.risk_level==='Low'?'#22c55e':r.risk_level==='Moderate'?'#f59e0b':'#ef4444';
  document.getElementById('drawerTitle').textContent = `Assessment #${r.id}`;
  document.getElementById('drawerContent').innerHTML = `
    <div class="detail-row"><span class="detail-key">Date</span><span class="detail-val">${r.timestamp}</span></div>
    <div class="detail-row"><span class="detail-key">Age</span><span class="detail-val">${r.age} years</span></div>
    <div class="detail-row"><span class="detail-key">Sex</span><span class="detail-val">${r.sex}</span></div>
    <div class="detail-row"><span class="detail-key">Probability</span><span class="detail-val" style="color:${probColor}">${r.probability}%</span></div>
    <div class="detail-row"><span class="detail-key">Risk Level</span><span class="detail-val"><span class="risk-pill risk-${r.risk_level}">${r.risk_level}</span></span></div>
    <div class="detail-row"><span class="detail-key">Prediction</span><span class="detail-val">${r.prediction===1?'Disease Likely':'No Disease Detected'}</span></div>
    <br/>
    <div style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.5rem">Key Factors</div>
    <div class="factors-list">${(r.key_factors||[]).map(f=>`<div class="factor-item">${f}</div>`).join('')}</div>
  `;
  document.getElementById('drawerActions').innerHTML = `
    <a href="/chat?pred_id=${r.id}" class="drawer-btn primary">💬 Discuss with AI Assistant</a>
    <a href="/report/${r.id}"       class="drawer-btn secondary">📄 Download PDF Report</a>
  `;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

loadData();
</script>
</body>
</html>
